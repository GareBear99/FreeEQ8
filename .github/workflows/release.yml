name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CMake
        run: brew install cmake

      - name: Build universal binary (FreeEQ8 + ProEQ8)
        run: |
          mkdir -p build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="10.13"
          cmake --build build --config Release --target FreeEQ8_All
          cmake --build build --config Release --target ProEQ8_All

      - name: Verify universal binaries
        run: |
          echo "=== FreeEQ8 VST3 ==="
          file build/FreeEQ8_artefacts/Release/VST3/FreeEQ8.vst3/Contents/MacOS/FreeEQ8
          lipo -info build/FreeEQ8_artefacts/Release/VST3/FreeEQ8.vst3/Contents/MacOS/FreeEQ8
          echo "=== FreeEQ8 AU ==="
          file build/FreeEQ8_artefacts/Release/AU/FreeEQ8.component/Contents/MacOS/FreeEQ8
          lipo -info build/FreeEQ8_artefacts/Release/AU/FreeEQ8.component/Contents/MacOS/FreeEQ8
          echo "=== FreeEQ8 Standalone ==="
          file build/FreeEQ8_artefacts/Release/Standalone/FreeEQ8.app/Contents/MacOS/FreeEQ8
          lipo -info build/FreeEQ8_artefacts/Release/Standalone/FreeEQ8.app/Contents/MacOS/FreeEQ8
          echo "=== ProEQ8 VST3 ==="
          file build/ProEQ8_artefacts/Release/VST3/ProEQ8.vst3/Contents/MacOS/ProEQ8
          lipo -info build/ProEQ8_artefacts/Release/VST3/ProEQ8.vst3/Contents/MacOS/ProEQ8

      - name: Package DMG
        run: ./package_macos.sh build

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/FreeEQ8-v*-macOS.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libasound2-dev libjack-jackd2-dev \
            libfreetype6-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxfixes-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.0-dev libcurl4-openssl-dev \
            ladspa-sdk

      - name: Build & run tests
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DFREEEQ8_BUILD_TESTS=ON
          cmake --build build --config Release -j$(nproc)
          ./build/FreeEQ8_Tests

      - name: Build ProEQ8
        run: cmake --build build --config Release --target ProEQ8_All -j$(nproc)

      - name: Package tar.gz
        run: |
          VERSION=$(grep 'project(FreeEQ8 VERSION' CMakeLists.txt | sed 's/.*VERSION \([0-9.]*\).*/\1/')
          DIR="FreeEQ8-v${VERSION}-Linux"
          mkdir -p "build/${DIR}"
          cp -r build/FreeEQ8_artefacts/Release/VST3/FreeEQ8.vst3 "build/${DIR}/"
          # Include Standalone binary if built
          STANDALONE="build/FreeEQ8_artefacts/Release/Standalone/FreeEQ8"
          if [ -f "$STANDALONE" ]; then
            cp "$STANDALONE" "build/${DIR}/FreeEQ8-Standalone"
          fi
          tar czf "build/${DIR}.tar.gz" -C build "${DIR}"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: build/FreeEQ8-v*-Linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build FreeEQ8 + ProEQ8
        run: cmake --build build --config Release

      - name: Package zip
        shell: pwsh
        run: |
          $version = (Select-String -Path CMakeLists.txt -Pattern 'project\(FreeEQ8 VERSION ([0-9.]+)').Matches.Groups[1].Value
          $zipName = "FreeEQ8-v${version}-Windows"
          $staging = "build\$zipName"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          # Copy VST3
          $vst3 = "build\FreeEQ8_artefacts\Release\VST3\FreeEQ8.vst3"
          if (Test-Path $vst3) {
            Copy-Item -Recurse $vst3 "$staging\"
          }

          # Copy Standalone
          $standalone = "build\FreeEQ8_artefacts\Release\Standalone\FreeEQ8.exe"
          if (Test-Path $standalone) {
            Copy-Item $standalone "$staging\"
          }

          # Create install instructions
          @"
          FreeEQ8 v${version} — Windows Installation
          =============================================

          1. Copy the FreeEQ8.vst3 folder to:
             C:\Program Files\Common Files\VST3\

          2. Rescan plugins in your DAW:
             - Ableton Live: Preferences > Plug-ins > Rescan
             - FL Studio: Options > Manage plugins > Find plugins
             - Reaper: Options > Preferences > VST > Re-scan

          https://github.com/GareBear99/FreeEQ8
          License: GPL-3.0
          "@ | Out-File -FilePath "$staging\README.txt" -Encoding utf8

          Compress-Archive -Path "$staging\*" -DestinationPath "build\${zipName}.zip" -Force

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: build/FreeEQ8-v*-Windows.zip

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-tar
          path: artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: artifacts

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.tar.gz
            artifacts/*.zip
